<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#dashGrad)"/>
  
  <!-- Dashboard mockup -->
  <g transform="translate(100, 80)">
    <!-- Main card -->
    <rect x="0" y="0" width="600" height="440" rx="12" fill="white" filter="drop-shadow(0 10px 30px rgba(0,0,0,0.1))"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="600" height="60" rx="12" fill="#1e3a8a"/>
    <circle cx="30" cy="30" r="12" fill="#fb7185"/>
    <rect x="60" y="20" width="200" height="8" rx="4" fill="white" opacity="0.8"/>
    <rect x="60" y="35" width="120" height="6" rx="3" fill="white" opacity="0.5"/>
    
    <!-- Stats cards -->
    <rect x="30" y="90" width="160" height="100" rx="8" fill="#eff6ff"/>
    <rect x="220" y="90" width="160" height="100" rx="8" fill="#fef2f2"/>
    <rect x="410" y="90" width="160" height="100" rx="8" fill="#f0fdf4"/>
    
    <!-- Stats icons -->
    <circle cx="70" cy="120" r="15" fill="#3b82f6"/>
    <circle cx="260" cy="120" r="15" fill="#f43f5e"/>
    <circle cx="450" cy="120" r="15" fill="#10b981"/>
    
    <!-- Stats text -->
    <rect x="50" y="150" width="80" height="12" rx="6" fill="#1e3a8a" opacity="0.3"/>
    <rect x="50" y="168" width="50" height="8" rx="4" fill="#1e3a8a" opacity="0.2"/>
    
    <rect x="240" y="150" width="80" height="12" rx="6" fill="#991b1b" opacity="0.3"/>
    <rect x="240" y="168" width="50" height="8" rx="4" fill="#991b1b" opacity="0.2"/>
    
    <rect x="430" y="150" width="80" height="12" rx="6" fill="#065f46" opacity="0.3"/>
    <rect x="430" y="168" width="50" height="8" rx="4" fill="#065f46" opacity="0.2"/>
    
    <!-- Chart area -->
    <rect x="30" y="220" width="540" height="180" rx="8" fill="#f8fafc"/>
    
    <!-- Bar chart visualization -->
    <rect x="60" y="320" width="40" height="60" rx="4" fill="#3b82f6" opacity="0.7"/>
    <rect x="120" y="290" width="40" height="90" rx="4" fill="#3b82f6" opacity="0.7"/>
    <rect x="180" y="310" width="40" height="70" rx="4" fill="#3b82f6" opacity="0.7"/>
    <rect x="240" y="270" width="40" height="110" rx="4" fill="#fb7185" opacity="0.7"/>
    <rect x="300" y="300" width="40" height="80" rx="4" fill="#fb7185" opacity="0.7"/>
    <rect x="360" y="280" width="40" height="100" rx="4" fill="#10b981" opacity="0.7"/>
    <rect x="420" y="295" width="40" height="85" rx="4" fill="#10b981" opacity="0.7"/>
    <rect x="480" y="305" width="40" height="75" rx="4" fill="#10b981" opacity="0.7"/>
    
    <!-- Chart labels -->
    <text x="55" y="395" font-family="Arial" font-size="10" fill="#64748b">Jan</text>
    <text x="115" y="395" font-family="Arial" font-size="10" fill="#64748b">Feb</text>
    <text x="175" y="395" font-family="Arial" font-size="10" fill="#64748b">Mar</text>
    <text x="235" y="395" font-family="Arial" font-size="10" fill="#64748b">Apr</text>
    <text x="295" y="395" font-family="Arial" font-size="10" fill="#64748b">May</text>
    <text x="355" y="395" font-family="Arial" font-size="10" fill="#64748b">Jun</text>
    <text x="415" y="395" font-family="Arial" font-size="10" fill="#64748b">Jul</text>
    <text x="475" y="395" font-family="Arial" font-size="10" fill="#64748b">Aug</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="20" fill="#3b82f6" opacity="0.1"/>
  <circle cx="750" cy="550" r="30" fill="#fb7185" opacity="0.1"/>
</svg>
