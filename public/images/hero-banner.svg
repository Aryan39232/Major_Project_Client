<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fb7185;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f43f5e;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#heroGradient)"/>
  
  <!-- Abstract network connections -->
  <g opacity="0.3">
    <circle cx="200" cy="150" r="4" fill="#60a5fa"/>
    <circle cx="400" cy="200" r="4" fill="#60a5fa"/>
    <circle cx="600" cy="100" r="4" fill="#60a5fa"/>
    <circle cx="800" cy="250" r="4" fill="#60a5fa"/>
    <circle cx="1000" cy="180" r="4" fill="#60a5fa"/>
    
    <line x1="200" y1="150" x2="400" y2="200" stroke="#60a5fa" stroke-width="1"/>
    <line x1="400" y1="200" x2="600" y2="100" stroke="#60a5fa" stroke-width="1"/>
    <line x1="600" y1="100" x2="800" y2="250" stroke="#60a5fa" stroke-width="1"/>
    <line x1="800" y1="250" x2="1000" y2="180" stroke="#60a5fa" stroke-width="1"/>
  </g>
  
  <!-- Main illustration - Collaboration concept -->
  <g transform="translate(700, 200)">
    <!-- Influencer icon -->
    <circle cx="0" cy="0" r="60" fill="url(#accentGradient)"/>
    <circle cx="0" cy="-15" r="20" fill="white"/>
    <path d="M -25 20 Q 0 10 25 20" fill="white"/>
    <path d="M -15 35 L -15 50 M 15 35 L 15 50" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(900, 200)">
    <!-- Brand icon -->
    <circle cx="0" cy="0" r="60" fill="#fbbf24"/>
    <rect x="-20" y="-20" width="40" height="40" rx="5" fill="white"/>
    <circle cx="0" cy="0" r="12" fill="#fbbf24"/>
  </g>
  
  <!-- Connection line -->
  <line x1="760" y1="200" x2="840" y2="200" stroke="white" stroke-width="3" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" from="0" to="10" dur="1s" repeatCount="indefinite"/>
  </line>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="450" r="80" fill="#3b82f6" opacity="0.2"/>
  <circle cx="1050" cy="500" r="60" fill="#fb7185" opacity="0.2"/>
</svg>
